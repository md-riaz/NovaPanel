# ============================================================================
# NovaPanel – Apache Terminal Proxy Configuration
#
# Requires: mod_proxy, mod_proxy_http, mod_proxy_wstunnel, mod_rewrite
#
# Add these directives inside your <VirtualHost> block.
# ============================================================================

    # Enable required proxy modules (ensure these are loaded in httpd.conf)
    # LoadModule proxy_module         modules/mod_proxy.so
    # LoadModule proxy_http_module    modules/mod_proxy_http.so
    # LoadModule proxy_wstunnel_module modules/mod_proxy_wstunnel.so
    # LoadModule rewrite_module       modules/mod_rewrite.so

    # -------------------------------------------------------------------------
    # Terminal WebSocket proxy
    # -------------------------------------------------------------------------
    <IfModule mod_proxy.c>
        ProxyRequests Off

        # Upgrade HTTP connections to WebSocket for ttyd
        RewriteEngine On
        RewriteCond %{HTTP:Upgrade} websocket [NC]
        RewriteCond %{REQUEST_URI}  ^/internal/terminal/[0-9a-f-]{36}$ [NC]
        RewriteRule ^/internal/terminal/([0-9a-f-]{36})$ ws://127.0.0.1:%%{ENV:TTYD_PORT}/ [P,L]

        # HTTP fallback for ttyd static assets
        <LocationMatch "^/internal/terminal/([0-9a-f-]{36})">
            # Validate the panel session via an internal sub-request to /auth_check
            # Apache does not have a native auth_request module; use mod_authnz_external
            # or a custom RewriteRule + header approach.  Example with header forwarding:
            RequestHeader set X-NovaPanel-Auth-Check "1"
            ProxyPassMatch ^/internal/terminal/([0-9a-f-]{36})(.*)$ http://127.0.0.1:${TTYD_PORT}/$2
            ProxyPassReverse / http://127.0.0.1:${TTYD_PORT}/
        </LocationMatch>
    </IfModule>

    # -------------------------------------------------------------------------
    # Notes
    # -------------------------------------------------------------------------
    # Apache lacks a built-in auth_request equivalent.  To enforce session
    # validation you can:
    #   a) Use mod_authnz_external with a custom script that calls /auth_check.
    #   b) Use a reverse proxy (e.g. HAProxy or Nginx in front of Apache) to
    #      perform auth_request before forwarding to Apache.
    #   c) Rely solely on the PHP application-layer RBAC check in
    #      TerminalController (already implemented).
    #
    # The TTYD_PORT environment variable must be set per-request to the port
    # returned by TerminalSessionRepository for the given session_id.
    # A rewrite map or a custom mod_rewrite map query can achieve this.
