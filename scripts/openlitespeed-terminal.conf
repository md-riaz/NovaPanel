# ============================================================================
# NovaPanel – OpenLiteSpeed Terminal Proxy Configuration
#
# Add the following contexts via the OpenLiteSpeed WebAdmin Console or
# directly in the virtual-host configuration file.
# ============================================================================

# -------------------------------------------------------------------------
# 1. External Application (one entry per active ttyd port)
#    Create a Generic Proxy app for each port in the 7100-7199 range.
#    Name: ttyd_proxy_<port>
# -------------------------------------------------------------------------
extprocessor ttyd_proxy_7100 {
  type                proxy
  address             127.0.0.1:7100
  maxConns            1
  pcKeepAliveTimeout  900
  initTimeout         10
  retryTimeout        0
  respBuffer          0
}

# Add additional extprocessor blocks for ports 7101–7199 as needed.

# -------------------------------------------------------------------------
# 2. Context – route /internal/terminal/{session_id} to the correct proxy
#    The session_id→port mapping must be resolved before proxying.
#    OpenLiteSpeed does not support dynamic upstream selection natively;
#    use a rewrite rule to route based on a cookie / header set by the
#    PHP application.
# -------------------------------------------------------------------------
context /internal/terminal/ {
  type                proxy
  handler             ttyd_proxy_7100   # Replace with dynamic resolution
  addDefaultCharset   off

  # Rewrite rules for WebSocket upgrade
  rewrite {
    RewriteRule ^/internal/terminal/([0-9a-f-]{36})(.*)$ /$2 [P,L]
  }

  # Access control: only allow authenticated panel sessions.
  # OpenLiteSpeed validates via the PHP session cookie using an
  # access control hook or the built-in Request Filter.
  accessControl {
    allow             127.0.0.1
  }
}

# -------------------------------------------------------------------------
# Notes
# -------------------------------------------------------------------------
# OpenLiteSpeed does not have a native auth_request mechanism equivalent
# to Nginx.  Recommended approaches:
#
#   a) Run Nginx in front of OpenLiteSpeed as a reverse proxy (preferred).
#      Nginx performs auth_request; OLS handles PHP-FPM.
#
#   b) Use OpenLiteSpeed's mod_security or a custom Lua/LSAPI hook to
#      validate the PHP session before proxying to ttyd.
#
#   c) Rely on the PHP application-layer RBAC check in TerminalController
#      (already implemented) as the primary access gate, and treat the
#      proxy layer as a transport only.
#
# Ensure ttyd ports (7100-7199) are blocked from direct external access
# via your firewall (e.g. ufw deny 7100:7199/tcp).
