# ============================================================================
# NovaPanel – Nginx Terminal Proxy Configuration
#
# Add this block inside your NovaPanel server {} block.
#
# Architecture:
#   Browser → Nginx (/internal/terminal/{session_id})
#          → auth_request /auth_check (PHP session validation)
#          → ttyd process (localhost:{port}, matched via DB session lookup)
#
# The session_id in the URL is mapped to a ttyd port by the PHP auth_check
# endpoint, which also sets X-Terminal-Port as a response header consumed
# by the @terminal_proxy named location.
# ============================================================================

    # -------------------------------------------------------------------------
    # Terminal WebSocket proxy – one ttyd process per session
    # -------------------------------------------------------------------------
    location ~ ^/internal/terminal/([0-9a-f-]{36})$ {
        auth_request      /auth_check;
        auth_request_set  $terminal_port $upstream_http_x_terminal_port;
        error_page 401 = /login;
        error_page 403 = /login;

        proxy_pass        http://127.0.0.1:$terminal_port;
        proxy_http_version 1.1;
        proxy_set_header  Upgrade    $http_upgrade;
        proxy_set_header  Connection "upgrade";
        proxy_set_header  Host       $host;
        proxy_set_header  X-Real-IP  $remote_addr;
        proxy_set_header  X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header  X-Forwarded-Proto $scheme;
        proxy_set_header  X-NovaPanel-Session $1;
        proxy_read_timeout 900s;   # 15 min – matches SESSION_TTL
        proxy_send_timeout 900s;
        proxy_buffering   off;
    }

    # -------------------------------------------------------------------------
    # Internal auth-request endpoint (not accessible directly)
    # Returns 200 + X-Terminal-Port header when session is valid.
    # -------------------------------------------------------------------------
    location = /auth_check {
        internal;
        fastcgi_pass  unix:/var/run/php/php8.2-fpm-novapanel.sock;
        fastcgi_param SCRIPT_FILENAME $document_root/index.php;
        fastcgi_param REQUEST_URI     /auth_check;
        fastcgi_param HTTP_COOKIE     $http_cookie;
        include fastcgi_params;
    }
